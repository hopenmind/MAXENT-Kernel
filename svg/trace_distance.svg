<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="500" height="240">
  <defs>
    <linearGradient id="bgT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <filter id="gT">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="240" fill="url(#bgT)" rx="10"/>

  <!-- Title -->
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a90d9" letter-spacing="3" opacity="0.8">TRACE DISTANCE  D(t)  ·  POPULATION DYNAMICS</text>

  <!-- Plot area -->
  <rect x="50" y="35" width="430" height="160" rx="4" fill="#060a14" opacity="0.7"/>

  <!-- Axes -->
  <line x1="50" y1="195" x2="480" y2="195" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="35" x2="50" y2="195" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>

  <!-- Axis labels -->
  <text x="265" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90d9" opacity="0.5">time  t →</text>
  <text x="22" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90d9" opacity="0.5" transform="rotate(-90,22,115)">ρ₁₁(t)</text>

  <!-- Y axis ticks -->
  <line x1="46" y1="195" x2="50" y2="195" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>
  <text x="42" y="198" text-anchor="end" font-family="monospace" font-size="8" fill="#4a90d9" opacity="0.5">0</text>
  <line x1="46" y1="115" x2="50" y2="115" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>
  <text x="42" y="118" text-anchor="end" font-family="monospace" font-size="8" fill="#4a90d9" opacity="0.5">0.5</text>
  <line x1="46" y1="35" x2="50" y2="35" stroke="#4a90d9" stroke-width="1" opacity="0.5"/>
  <text x="42" y="38" text-anchor="end" font-family="monospace" font-size="8" fill="#4a90d9" opacity="0.5">1</text>

  <!-- Lindblad curve: pure exponential decay -->
  <path d="M50,35 C80,40 110,58 140,80 C170,102 210,135 260,158 C310,175 360,185 420,191 C450,193 465,194 480,195"
        stroke="#2ecc71" stroke-width="2" fill="none" opacity="0.85" filter="url(#gT)"/>

  <!-- Non-Markovian curve: slower decay + revivals -->
  <path d="M50,35 C75,42 100,62 130,85 C158,105 175,128 190,145 C205,158 215,168 225,162 C238,155 248,142 260,138 C272,134 285,140 298,150 C312,160 322,170 335,172 C350,174 362,170 380,172 C400,174 440,182 480,190"
        stroke="#4a90d9" stroke-width="2.5" fill="none" opacity="0.9" filter="url(#gT)"/>

  <!-- Shaded difference area (rough) -->
  <path d="M130,85 C145,95 160,110 175,125 C190,140 205,152 220,155 C235,152 248,143 258,140 C228,145 215,160 205,168 C195,155 183,138 168,118 C153,98 140,80 130,85"
        fill="#4a90d9" opacity="0.08"/>

  <!-- Legends -->
  <line x1="60" y1="210" x2="90" y2="210" stroke="#2ecc71" stroke-width="2"/>
  <text x="95" y="213" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.8">Lindblad (Markovian)</text>

  <line x1="230" y1="210" x2="260" y2="210" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="265" y="213" font-family="monospace" font-size="9" fill="#7fb3e8" opacity="0.8">Non-Markovian (MaxEnt)</text>

  <!-- Revival annotation -->
  <text x="225" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c" opacity="0.8">revival</text>
  <line x1="225" y1="132" x2="225" y2="148" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
  <circle cx="225" cy="152" r="3" fill="#e74c3c" opacity="0.7"/>
</svg>
