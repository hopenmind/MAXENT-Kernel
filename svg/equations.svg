<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" width="780" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="780" height="280" fill="url(#bg)" rx="10"/>

  <!-- Left vertical accent bar -->
  <rect x="0" y="0" width="4" height="280" rx="2" fill="#4a90d9" opacity="0.7"/>

  <!-- Header -->
  <text x="390" y="25" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a90d9" letter-spacing="5" opacity="0.8">THREE EQUATIONS · COMPLETE THEORY</text>

  <!-- Equation 1 -->
  <g transform="translate(0,0)">
    <text x="30" y="65" font-family="monospace" font-size="10" fill="#4a90d9" opacity="0.6">EQ. 1  —  GENERALIZED MASTER EQUATION WITH MEMORY</text>
    <text x="100" y="95" font-family="serif" font-size="18" fill="#7fb3e8" filter="url(#softglow)">dρ/dt  =  −i[H, ρ(t)]  +  ∫₀ᵗ K(t,s) · 𝒟[ρ(s)] ds</text>
    <line x1="30" y1="105" x2="750" y2="105" stroke="#4a90d9" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Equation 2 -->
  <g transform="translate(0,0)">
    <text x="30" y="130" font-family="monospace" font-size="10" fill="#9b59b6" opacity="0.6">EQ. 2  —  BOLTZMANN KERNEL  (MaxEnt derivation, not postulated)</text>
    <text x="100" y="160" font-family="serif" font-size="18" fill="#c39bd3" filter="url(#softglow)">K*(t,s)  =  (1/Z(t)) · exp( −e(t,s) / T )</text>
    <text x="120" y="182" font-family="serif" font-size="13" fill="#9b59b6" opacity="0.8">where  e(t,s)  =  ∫ₛᵗ |C(τ−s)|² dτ</text>
    <line x1="30" y1="195" x2="750" y2="195" stroke="#9b59b6" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Equation 3 -->
  <g transform="translate(0,0)">
    <text x="30" y="218" font-family="monospace" font-size="10" fill="#2ecc71" opacity="0.6">EQ. 3  —  BATH CORRELATION FROM SPECTRAL DENSITY</text>
    <text x="100" y="248" font-family="serif" font-size="18" fill="#82e0aa" filter="url(#softglow)">C(τ)  =  g²  ∫₀^∞  J(ω) · e^(−i(ω−ω₀)τ)  dω</text>
    <text x="120" y="268" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.5">Input: J(ω)  →  Output: K*(t,s)  →  Solve dynamics</text>
  </g>
</svg>
