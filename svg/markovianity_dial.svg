<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <filter id="gD">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Gradient for arc: green→yellow→red -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="40%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>

  <rect width="400" height="220" fill="url(#bgD)" rx="10"/>

  <text x="200" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a90d9" letter-spacing="3" opacity="0.8">NON-MARKOVIANITY  PARAMETER  P</text>

  <!-- Semicircle arc background -->
  <path d="M 50 160 A 150 150 0 0 1 350 160" stroke="#1a2030" stroke-width="20" fill="none"/>
  <!-- Colored arc -->
  <path d="M 50 160 A 150 150 0 0 1 350 160" stroke="url(#arcGrad)" stroke-width="16" fill="none" opacity="0.85" filter="url(#gD)"/>

  <!-- Tick marks and labels -->
  <!-- P=0 -->
  <line x1="50" y1="160" x2="38" y2="148" stroke="#2ecc71" stroke-width="1.5" opacity="0.7"/>
  <text x="30" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.8">0</text>

  <!-- P=0.1 -->
  <line x1="80" y1="95" x2="70" y2="82" stroke="#2ecc71" stroke-width="1" opacity="0.6"/>
  <text x="62" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#2ecc71" opacity="0.6">0.1</text>

  <!-- P=0.5 -->
  <line x1="200" y1="10" x2="200" y2="-5" stroke="#f1c40f" stroke-width="1.5" opacity="0.6" transform="translate(0,12)"/>
  <text x="200" y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#f1c40f" opacity="0.7">0.5</text>

  <!-- P=1 -->
  <line x1="320" y1="95" x2="330" y2="82" stroke="#e67e22" stroke-width="1" opacity="0.6"/>
  <text x="338" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#e67e22" opacity="0.6">1.0</text>

  <!-- P=∞ -->
  <line x1="350" y1="160" x2="362" y2="148" stroke="#e74c3c" stroke-width="1.5" opacity="0.7"/>
  <text x="372" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c" opacity="0.8">∞</text>

  <!-- Needle at ~P=0.6 (non-Markovian example) -->
  <g transform="translate(200,160)">
    <line x1="0" y1="0" x2="-88" y2="-110" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#gD)" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#1a2030" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
  </g>

  <!-- Zone labels -->
  <text x="80" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.8">Markovian</text>
  <text x="80" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#2ecc71" opacity="0.5">P &lt; 0.1</text>

  <text x="200" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#f1c40f" opacity="0.8">Intermediate</text>

  <text x="320" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c" opacity="0.8">Strongly NM</text>
  <text x="320" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c" opacity="0.5">P &gt; 1</text>

  <!-- Example readout -->
  <rect x="140" y="195" width="120" height="22" rx="4" fill="#0d1528" stroke="#4a90d9" stroke-width="0.8" opacity="0.8"/>
  <text x="200" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#7fb3e8">P = 0.63  example</text>
</svg>
