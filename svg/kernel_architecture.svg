<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1528;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2018;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9" opacity="0.8"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6" opacity="0.8"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines subtle -->
  <g opacity="0.06" stroke="#4a90d9">
    <line x1="0" y1="105" x2="800" y2="105"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="315" x2="800" y2="315"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#4a90d9" opacity="0.9" letter-spacing="4">MAXENT-KERNEL · ARCHITECTURE FLOW</text>

  <!-- Node 1: J(ω) Input -->
  <rect x="30" y="55" width="140" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#4a90d9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="100" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a90d9" font-weight="bold">INPUT</text>
  <text x="100" y="98" text-anchor="middle" font-family="monospace" font-size="14" fill="#7fb3e8">J(ω)</text>
  <text x="100" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90d9" opacity="0.7">spectral density</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="90" x2="218" y2="90" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- Node 2: C(τ) -->
  <rect x="220" y="55" width="140" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#4a90d9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="290" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a90d9" font-weight="bold">BATH CORRELATION</text>
  <text x="290" y="98" text-anchor="middle" font-family="monospace" font-size="14" fill="#7fb3e8">C(τ)</text>
  <text x="290" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90d9" opacity="0.7">Fourier transform of J(ω)</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="90" x2="408" y2="90" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- Node 3: MaxEnt K*(t,s) — central, highlighted -->
  <rect x="410" y="45" width="160" height="90" rx="10" fill="url(#nodeGrad2)" stroke="#9b59b6" stroke-width="2" filter="url(#glow)"/>
  <text x="490" y="70" text-anchor="middle" font-family="monospace" font-size="10" fill="#c39bd3" font-weight="bold">MAXENT KERNEL</text>
  <text x="490" y="90" text-anchor="middle" font-family="monospace" font-size="14" fill="#d7bde2">K*(t,s)</text>
  <text x="490" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#9b59b6" opacity="0.8">Boltzmann · Jaynes principle</text>
  <text x="490" y="124" text-anchor="middle" font-family="monospace" font-size="9" fill="#9b59b6" opacity="0.6">least-biased memory</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="90" x2="618" y2="90" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrow2)" opacity="0.8"/>

  <!-- Node 4: Integro-diff solver -->
  <rect x="620" y="55" width="150" height="70" rx="8" fill="url(#nodeGrad2)" stroke="#9b59b6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="695" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#c39bd3" font-weight="bold">NON-MARKOVIAN</text>
  <text x="695" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#d7bde2">dρ/dt solver</text>
  <text x="695" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#9b59b6" opacity="0.7">integro-differential</text>

  <!-- Lindblad branch — below -->
  <!-- Arrow from J(ω) down to Lindblad -->
  <line x1="100" y1="125" x2="100" y2="195" stroke="#2ecc71" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="100" y1="195" x2="620" y2="195" stroke="#2ecc71" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="620" y1="195" x2="620" y2="230" stroke="#2ecc71" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow3)" opacity="0.6"/>

  <text x="360" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.7">parallel Lindblad path</text>

  <!-- Node 5: Lindblad -->
  <rect x="570" y="232" width="160" height="65" rx="8" fill="url(#nodeGrad3)" stroke="#2ecc71" stroke-width="1.5" filter="url(#glow)"/>
  <text x="650" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="#82e0aa" font-weight="bold">LINDBLAD</text>
  <text x="650" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#abebc6">standard Markovian</text>
  <text x="650" y="286" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0.7">dρ/dt = L[ρ]</text>

  <!-- Comparator -->
  <!-- Arrows from both solvers to comparator -->
  <line x1="695" y1="125" x2="695" y2="155" stroke="#9b59b6" stroke-width="1.5" opacity="0.7"/>
  <line x1="695" y1="155" x2="730" y2="155" stroke="#9b59b6" stroke-width="1.5" opacity="0.7"/>
  <line x1="730" y1="155" x2="730" y2="320" stroke="#e74c3c" stroke-width="1.5" opacity="0.7"/>
  <line x1="650" y1="297" x2="650" y2="320" stroke="#2ecc71" stroke-width="1.5" opacity="0.7"/>
  <line x1="650" y1="320" x2="730" y2="320" stroke="#e74c3c" stroke-width="1.5" opacity="0.7"/>

  <!-- Comparator node -->
  <circle cx="730" cy="355" r="28" fill="#1a0a0a" stroke="#e74c3c" stroke-width="2" filter="url(#glow)"/>
  <text x="730" y="352" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c" font-weight="bold">TRACE</text>
  <text x="730" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c" font-weight="bold">DIST.</text>

  <line x1="730" y1="320" x2="730" y2="327" stroke="#e74c3c" stroke-width="1.5" opacity="0.8" marker-end="url(#arrow)"/>

  <!-- Output label -->
  <rect x="30" y="330" width="560" height="70" rx="8" fill="#0a0e1a" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3" opacity="0.9"/>
  <text x="310" y="352" text-anchor="middle" font-family="monospace" font-size="10" fill="#e74c3c" font-weight="bold">DIAGNOSTIC OUTPUT</text>
  <text x="310" y="370" text-anchor="middle" font-family="monospace" font-size="9" fill="#f1948a">D &lt; 0.01  →  Lindblad valid ✓</text>
  <text x="310" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#f1948a">D &gt; 0.01  →  Lindblad wrong · non-Markovian dynamics shown ✗</text>
  <text x="310" y="400" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c" opacity="0.7">memory kernel shape · population revivals · P parameter</text>

  <!-- P parameter indicator -->
  <text x="400" y="418" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a90d9" opacity="0.4">MaxEnt-Kernel · DESVAUX G.J.Y. 2008–2026 · DOI: 10.5281/zenodo.19486927</text>
</svg>
